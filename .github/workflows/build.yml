name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Release 发布需要写权限(默认 GITHUB_TOKEN 只读)
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: hwtransmib-macos.zip
            archive_cmd: cd dist && zip -r -X ../hwtransmib-macos.zip HWTransMIB.app && cd ..
          - os: windows-latest
            artifact: hwtransmib-windows.zip
            archive_cmd: cd dist && 7z a ../hwtransmib-windows.zip hwtransmib.exe && cd ..
          - os: ubuntu-latest
            artifact: hwtransmib-linux.tar.gz
            archive_cmd: cd dist && tar czf ../hwtransmib-linux.tar.gz hwtransmib && cd ..

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libegl1 libgl1 libdbus-1-3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm hwtransmib.spec

      - name: Package artifact
        run: ${{ matrix.archive_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
